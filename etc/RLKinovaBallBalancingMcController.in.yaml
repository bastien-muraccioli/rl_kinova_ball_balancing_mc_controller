---
# If true, the FSM transitions are managed by an external tool
Managed: false
# If true and the FSM is self-managed, transitions should be triggered
StepByStep: true
# Change idle behaviour, if true the state is kept until transition,
# otherwise the FSM holds the last state until transition
IdleKeepState: false
# Where to look for state libraries
StatesLibraries:
- "@MC_STATES_DEFAULT_RUNTIME_INSTALL_PREFIX@"
- "@MC_STATES_RUNTIME_INSTALL_PREFIX@"
# Where to look for state files
StatesFiles:
- "@MC_STATES_DEFAULT_RUNTIME_INSTALL_PREFIX@/data"
- "@MC_STATES_RUNTIME_INSTALL_PREFIX@/data"
# If true, state factory will be more verbose
VerboseStateFactory: false
# Additional robots to load
robots:
  ground:
    module: env/ground

# Collision constraint
collisions:
- type: collision
  useMinimal: true

ObserverPipelines:
- name: Pipeline
  observers:
    - type: Encoder
      config:
        velocity: encoderVelocities


# Implement some additional text states
states: {}
# Transitions map
transitions:
- [RLKinovaBallBalancingMcController_Initial, OK, RLKinovaBallBalancingMcController_Initial, Strict]
- [RLKinovaBallBalancingMcController_Initial, Start, RLKinovaBallBalancingMcController_RL, Strict]
- [RLKinovaBallBalancingMcController_RL, OK, RLKinovaBallBalancingMcController_Initial, Strict]
# Initial state
init: RLKinovaBallBalancingMcController_Initial

policy_path: ["v0-2026-04-09.onnx"]  # Path to the RL policy file(s)
default_policy_index: 0 # Index of the default policy to use
policies:
  # index 0 :
  - is_torque_control: true
    use_QP: true
    action_scale: 0.13
    policy_step_size: 0.01 # Policy step size in seconds
    physics_step_size: 0.001 # Physics step size in seconds
    pd_gains_ratio: 1.0
    kp:
      joint_1: 40.0
      joint_2: 40.0
      joint_3: 40.0
      joint_4: 40.0
      joint_5: 15.0
      joint_6: 15.0
      joint_7: 15.0

    kd:
      joint_1: 15.0
      joint_2: 15.0
      joint_3: 15.0
      joint_4: 15.0
      joint_5: 8.5
      joint_6: 8.5
      joint_7: 8.5
    
    q0:
      joint_1: 0.0
      joint_2: 0.2618
      joint_3: 3.14
      joint_4: -2.269
      joint_5: 0.0
      joint_6: 0.9599
      joint_7: 1.57
